<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Register</title>
</head>
<body>

<h1>Register</h1>

<form action="/register" method="post">

  <div>
    <label>Username</label>
    <input
            type="text"
            name="username">
  </div>

  <br>

  <div>
    <label>Name</label>
    <input
            type="text"
            name="name">
  </div>

  <br>

  <div>
    <label>Email</label>
    <input
            type="email"
            name="email">
  </div>

  <br>

  <div>
    <label>Password</label>
    <input
            type="password"
            name="password">
  </div>

  <br>

  <button type="submit">
    Register
  </button>

</form>

<br>

<a href="/login">
  Login
</a>

</body>
</html>
