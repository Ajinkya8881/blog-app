<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <title>Tags</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="header">
    <a href="/posts">Posts</a>
    <a href="/posts/new" sec:authorize="isAuthenticated()">Create Post</a>
    <a href="/tags" sec:authorize="isAuthenticated()">Tags</a>
    <a href="/logout" sec:authorize="isAuthenticated()">Logout</a>
    <a href="/login" sec:authorize="!isAuthenticated()">Login</a>
</div>

<hr>

<h1>Tags</h1>

<a href="/tags/new" sec:authorize="hasRole('ADMIN')">Create Tag</a>

<hr>

<div th:each="tag : ${tags}" class="post">

    <h3 th:text="${tag.name}"></h3>

    <th:block sec:authorize="hasRole('ADMIN')">
        <a th:href="@{/tags/{id}/edit(id=${tag.id})}">Edit</a>

        <form th:action="@{/tags/{id}/delete(id=${tag.id})}" method="post" class="inline-form">
            <button type="submit">Delete</button>
        </form>
    </th:block>

</div>

</body>
</html>
