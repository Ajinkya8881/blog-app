<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <title>Edit Post</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="header">
    <a href="/posts">Posts</a>
    <a href="/posts/new" sec:authorize="isAuthenticated()">Create Post</a>
    <a href="/tags" sec:authorize="isAuthenticated()">Tags</a>
    <a href="/logout" sec:authorize="isAuthenticated()">Logout</a>
</div>

<hr>

<h1>Edit Post</h1>

<form th:action="@{/posts/{id}/edit(id=${post.id})}" method="post">

    <label>Title</label>
    <input type="text" name="title" th:value="${post.title}">

    <label>Excerpt</label>
    <input type="text" name="excerpt" th:value="${post.excerpt}">

    <!-- admin can edit author, regular author sees it disabled -->
    <label>Author</label>
    <input type="text"
           name="author"
           th:value="${post.author}"
           sec:authorize="hasRole('ADMIN')">

    <input type="text"
           th:value="${post.author}"
           sec:authorize="!hasRole('ADMIN')"
           disabled>

    <input type="hidden"
           name="author"
           th:value="${post.author}"
           sec:authorize="!hasRole('ADMIN')">

    <label>Content</label>
    <textarea name="content" rows="10" th:text="${post.content}"></textarea>

    <h3>Tags</h3>

    <div th:each="tag : ${tags}">
        <input type="checkbox"
               name="tagIds"
               th:value="${tag.id}"
               th:checked="${post.tags.contains(tag)}">
        <span th:text="${tag.name}"></span><br>
    </div>

    <br>

    <button type="submit">Update Post</button>

</form>

</body>
</html>
